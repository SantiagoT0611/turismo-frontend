<section class="container mt-5 text-center">

  @if (destino) {

    <header>
      <h2>{{ destino.nombre }}</h2>
    </header>

    <div id="carouselDestino" class="carousel slide my-4">

      <div class="carousel-inner">

        @for (img of destino.imagenes; track img; let i = $index) {
          <div class="carousel-item" [class.active]="i === 0">
            <img [src]="img" class="d-block w-100" alt="imagen destino">
          </div>
        }

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carouselDestino" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#carouselDestino" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

    <article>
      <p>{{ destino.descripcion }}</p>
    </article>

    <footer class="mt-3">
      <button type = "button "class="btn btn-outline-info" (click)="agregarAFavoritos()">
        Agregar a favoritos
      </button>
    </footer>

  }

</section>
